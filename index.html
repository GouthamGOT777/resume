<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QFX Knowledge Portal - IP Infusion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="screen active">
    <div class="splash-card">
      <img src="https://github.com/GouthamGOT777/resume/raw/main/ipinfusion.png" alt="IP Infusion" class="splash-logo">
      <h1>🖥️ QFX Knowledge Portal</h1>
      <p>Juniper Pathfinder Data Viewer</p>
      <div class="splash-actions">
        <button id="continueGuest" class="btn btn-primary">👤 Continue as Guest</button>
        <button id="loginAdmin" class="btn btn-secondary">🔐 Login as Admin</button>
      </div>
    </div>
  </div>

  <!-- Login/Signup Screen -->
  <div id="loginScreen" class="screen hidden">
    <div class="form-card">
      <img src="https://github.com/GouthamGOT777/resume/raw/main/ipinfusion.png" alt="IP Infusion" class="form-logo">
      <h2>🔐 Admin Access</h2>
      <form id="adminForm">
        <input type="email" id="email" placeholder="admin@ipinfusion.com" required>
        <input type="password" id="password" placeholder="password" required>
        <input type="text" id="secretKey" placeholder="Secret Key (for signup)" required>
        <button type="submit" class="btn btn-primary">Login / Signup</button>
        <div class="form-hint">
          <small>Secret Key: <code>QFX HPE JNP BNG</code></small>
        </div>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="screen hidden">
    <header>
      <div class="header-left">
        <img src="https://github.com/GouthamGOT777/resume/raw/main/ipinfusion.png" alt="IP Infusion" class="logo">
        <div>
          <h1>🖥️ QFX Portal</h1>
          <span id="userRole" class="role-badge"></span>
        </div>
      </div>
      <div class="header-right">
        <button id="toggleEditMode" class="btn btn-edit hidden">✏️ Edit Mode</button>
        <button id="logoutBtn" class="btn btn-logout hidden">🚪 Logout</button>
      </div>
    </header>

    <div class="main-container">
      <!-- Sidebar: Products -->
      <aside id="sidebar">
        <h3>📋 QFX Products</h3>
        <div class="search-box">
          <input type="text" id="searchProducts" placeholder="Search QFX products...">
        </div>
        <ul id="productList"></ul>
      </aside>

      <!-- Main Content -->
      <main id="mainContent">
        <div class="content-placeholder">
          <h2>👆 Select a QFX product from sidebar</h2>
          <p>Admin: Toggle Edit Mode to modify content</p>
        </div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
